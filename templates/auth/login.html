{% extends 'base.html' %}
{% block title %}Login | LuxScent{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-logo">
            <span class="brand-icon">✦</span>
            <span class="brand-name">LuxScent</span>
        </div>
        <h2>Bem-vindo de volta</h2>
        <p>Acesse sua conta para ver seus pedidos</p>

        <form method="post" action="{{ url_for('auth.login') }}" class="auth-form">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-input" placeholder="seu@email.com" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Senha</label>
                <div class="input-icon-wrap">
                    <input type="password" name="password" id="passwordInput" class="form-input" placeholder="••••••••" required>
                    <button type="button" class="toggle-pass" onclick="togglePass()"><i class="fas fa-eye" id="eyeIcon"></i></button>
                </div>
            </div>
            <label class="form-check">
                <input type="checkbox" name="remember"> Lembrar de mim
            </label>
            <button type="submit" class="btn btn-gold btn-full btn-lg">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
        </form>

        <div class="auth-links">
            <span>Não tem conta?</span>
            <a href="{{ url_for('auth.register') }}">Cadastre-se grátis</a>
        </div>
        <div class="auth-links">
            <a href="{{ url_for('shop.home') }}">← Voltar à loja</a>
        </div>
    </div>
</section>
{% endblock %}
{% block extra_js %}
<script>
function togglePass() {
    const i = document.getElementById('passwordInput');
    const e = document.getElementById('eyeIcon');
    if (i.type === 'password') { i.type = 'text'; e.className = 'fas fa-eye-slash'; }
    else { i.type = 'password'; e.className = 'fas fa-eye'; }
}
</script>
{% endblock %}
