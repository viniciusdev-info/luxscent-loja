{% extends 'base.html' %}
{% block title %}Cadastro | LuxScent{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-logo">
            <span class="brand-icon">✦</span>
            <span class="brand-name">LuxScent</span>
        </div>
        <h2>Criar Conta Grátis</h2>
        <p>Acompanhe seus pedidos e muito mais</p>

        <form method="post" action="{{ url_for('auth.register') }}" class="auth-form">
            <div class="form-group">
                <label class="form-label">Nome Completo *</label>
                <input type="text" name="name" class="form-input" placeholder="Seu nome" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email *</label>
                <input type="email" name="email" class="form-input" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">WhatsApp</label>
                <input type="tel" name="phone" class="form-input" placeholder="(85) 99999-9999">
            </div>
            <div class="form-group">
                <label class="form-label">Senha *</label>
                <input type="password" name="password" class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <div class="form-group">
                <label class="form-label">Confirmar Senha *</label>
                <input type="password" name="confirm_password" class="form-input" placeholder="Repita a senha" required>
            </div>
            <button type="submit" class="btn btn-gold btn-full btn-lg">
                <i class="fas fa-user-plus"></i> Criar Conta
            </button>
        </form>

        <div class="auth-links">
            <span>Já tem conta?</span>
            <a href="{{ url_for('auth.login') }}">Faça login</a>
        </div>
    </div>
</section>
{% endblock %}
